<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi página en GitHub Pages</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      color: #333;
      text-align: center;
    }

    header {
      background: #24292e;
      color: white;
      padding: 20px;
    }

    main {
      padding: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 600px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    a {
      color: #0366d6;
      text-decoration: none;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>

  <header>
    <h1>Hola 👋</h1>
    <p>Bienvenido a mi sitio en GitHub Pages</p>
  </header>

  <main>
    <div class="card">
      <h2>Sobre mí</h2>
      <p>Este es un sitio web simple hecho con HTML y CSS.</p>
    </div>

    <div class="card">
      <h2>Proyectos</h2>
      <p>Puedes agregar aquí tus proyectos o enlaces.</p>
      <a href="https://github.com/">Mi GitHub</a>
    </div>
  </main>

  <footer>
    © 2026 - Hecho con GitHub Pages
  </footer>

</body>
</html>
